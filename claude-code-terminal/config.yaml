---
name: "Claude Code Terminal"
version: "2.0.1"
slug: claude_code_terminal
description: "Claude Code with HA MCP tools, auto-discovery, and persistent sessions"
url: "https://github.com/RTBRussell/ha-addons"
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 0
ingress_stream: true
panel_icon: mdi:robot
panel_title: "Claude Code"
homeassistant_api: true
hassio_api: true
hassio_role: manager
map:
  - homeassistant_config:rw
  - addon_config:rw
  - share:rw
  - ssl:ro
  - media:ro
options:
  anthropic_api_key: ""
  model: "sonnet"
  yolo_mode: false
  session_name: "claude"
schema:
  anthropic_api_key: "password"
  model: "list(sonnet|opus|haiku)"
  yolo_mode: "bool"
  session_name: "str"
